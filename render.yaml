# Render Blueprint – Medusa backend (opsiyonel: New > Blueprint ile kullan)
# Dashboard'da manuel servis kullanıyorsan Build/Start'ı aşağıdaki gibi ayarla.
#
# Bellek: Düz `npm install` (özellikle repo kökünde) Render'da heap OOM verebilir.
# - Root Directory BOŞ ise Build: npm run render:install-backend
# - Root Directory apps/medusa-backend ise aşağıdaki buildCommand yeterli (postinstall patch çalışır).
services:
  - type: web
    name: medusa-backend
    runtime: node
    rootDir: apps/medusa-backend
    buildCommand: NODE_OPTIONS=--max-old-space-size=8192 npm install --omit=dev --no-audit --no-fund
    startCommand: node server.js
    envVars:
      - key: PORT
        generateValue: true
      - key: NODE_ENV
        value: production
