# Render Blueprint – Medusa backend (opsiyonel: New > Blueprint ile kullan)
# Dashboard'da manuel servis kullanıyorsan Build/Start'ı aşağıdaki gibi ayarla.
services:
  - type: web
    name: medusa-backend
    runtime: node
    rootDir: apps/medusa-backend
    buildCommand: npm install --omit=dev --no-audit --no-fund && node scripts/patch-link-modules.js
    startCommand: node server.js
    envVars:
      - key: PORT
        generateValue: true
      - key: NODE_ENV
        value: production
