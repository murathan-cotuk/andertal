# Render Blueprint – Medusa backend (opsiyonel: New > Blueprint ile kullan)
# Dashboard'da manuel servis kullanıyorsan Build/Start'ı aşağıdaki gibi ayarla.
services:
  - type: web
    name: medusa-backend
    runtime: node
    # Root Directory: boş (repo kökü)
    # Monorepo install is memory-heavy; raise Node heap so npm doesn't OOM on Render builders.
    buildCommand: NODE_OPTIONS=--max-old-space-size=400 npm install --omit=dev --no-audit --no-fund && node apps/medusa-backend/scripts/patch-link-modules.js
    startCommand: node apps/medusa-backend/server.js
    envVars:
      - key: PORT
        generateValue: true
      - key: NODE_ENV
        value: production
