# Render deployment configuration
# Manuel ayar: Dashboard → Service → Build & Deploy
#
# Bellek (heap OOM): Tam monorepo `npm install` Render'da çökmez — şunlardan birini kullan:
#
# A) Root Directory = BOŞ (repo kökü)
#    Build command:
#      npm run render:install-backend
#    Start command (örnek):
#      node apps/medusa-backend/server.js
#
# B) Root Directory = apps/medusa-backend
#    Build command:
#      NODE_OPTIONS=--max-old-space-size=8192 npm install --omit=dev --no-audit --no-fund
#    (postinstall zaten scripts/patch-link-modules.js çalıştırır.)
#
# Build Command (Root Directory: apps/medusa-backend):
#   npm install && npm run build && (npm run db:setup || npm run db:migrate)
# ÖNEMLİ: Fallback "npm run migrate" DEĞİL, "npm run db:migrate" olmalı (projede "migrate" script'i yok).
# Parantez şart; && kullan (noktalı virgül değil).
# DATABASE_URL environment variable tanımlı olmalı.
#
# Geçici alternatif (db:setup/db:migrate hata verse bile build tamamlansın, start denensin):
#   npm install && npm run build && (npm run db:setup || npm run db:migrate || true)

# services:
#   - type: web
#     name: andertal-medusa-backend
#     env: node
#     region: frankfurt
#     rootDir: apps/medusa-backend
#     buildCommand: npm install && npm run build && (npm run db:setup || npm run db:migrate)
#     startCommand: npm start
#     healthCheckPath: /health
#
# databases:
#   - name: andertal-medusa-db
#     databaseName: medusa
#     user: medusa_user
#     plan: free
